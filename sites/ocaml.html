      <!-- body -->
      <div class="container content">
        <!-- Research -->
        <h2 id="convention">Coding Convention</h2>
        <ul>
          <li>
            Keep a tuple in a single line

            Instead of

            <code>
            (long_name_1, long_name_2, long_name_3,
            long_name_4, long_name_5, long_name_6)
            </code>

            Write:

            <code>
            let a1, a2, a3 = long_name_1, long_name_2, long_name_3 in
            let a4, a5, a6 = long_name_4, long_name_5, long_name_6 in
            (a1, a2, a3, a4, a5, a6)
            </code>
          </li>
        </ul>


      </div>

      <!-- footer -->
      <div w3-include-html="footer.html"></div>
    </div>

    <!-- Scripts -->
    <script>w3.includeHTML();</script>
